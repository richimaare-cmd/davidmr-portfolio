<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page title (shows in the browser tab) -->
    <title>David Maldonado — Strategist in Taiwan</title>

    <!-- Description for Google search results -->
    <meta
      name="description"
      content="David Maldonado — a strategist bridging Latin America and Asia. Strategy, ventures, and AI systems across two continents and four languages."
    />

    <!-- Open Graph: controls how the link looks when shared on LinkedIn / WhatsApp / etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://davidmr.me" />
    <meta property="og:title" content="David Maldonado — Strategist in Taiwan" />
    <meta
      property="og:description"
      content="Strategy, ventures, and AI systems across two continents and four languages."
    />
    <!-- When you have a cover image, drop it in /public as og-image.jpg and it will show in link previews -->
    <meta property="og:image" content="https://davidmr.me/og-image.jpg" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="David Maldonado — Strategist in Taiwan" />
    <meta
      name="twitter:description"
      content="Strategy, ventures, and AI systems across two continents and four languages."
    />
    <meta name="twitter:image" content="https://davidmr.me/og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
